version: 1
section: core
entry:
  id: AAGF-CORE-004
  file_slug: production-no-placeholder-integrity
  title: Production No-Placeholder Integrity
  intent: Изменения кода должны быть рабочими и завершенными; симуляция решения, заглушки и псевдо-фрагменты недопустимы.
  rules:
    - Агент MUST реализовывать рабочее решение задачи, а не имитировать исправление через placeholder-фрагменты.
    - В изменяемом коде и в итоговом handoff MUST NOT оставаться заглушки вида `/* ... */`, `/* остальное без изменений */`, `<to be implemented>` и эквиваленты.
    - Агент MUST NOT подменять реализацию "примером кода" в production-файлах, если пользователь не запросил именно пример.
    - При расширении функционала агент MUST предпочитать доработку и рефакторинг существующей логики; полный rewrite MAY выполняться только по явному подтверждению пользователя.
    - IF для временного обхода используется TODO/FIXME THEN запись MUST содержать причину, границы применения и task reference.
  if_then:
    - if: В измененном фрагменте обнаружены placeholder-комментарии или неполные блоки вместо реализации
      then: Агент MUST заменить их на полноценную реализацию до перехода задачи в done.
    - if: Предлагаемое изменение требует полного переписывания файла или модуля
      then: Агент MUST остановиться и запросить явное подтверждение пользователя на rewrite.
    - if: Для фикса требуется временный workaround (включая hardcode)
      then: Агент MUST получить подтверждение пользователя и зафиксировать rationale + task reference.
  checks:
    - Проверить измененные файлы на отсутствие placeholder-паттернов и псевдо-фрагментов.
    - Проверить, что в production-файлы не вставлены демонстрационные "примерные" блоки вместо рабочей логики.
    - Проверить, что масштаб правок соответствует задаче (refactor/extend), а rewrite подтвержден явно.
    - Проверить, что каждый TODO/FIXME в измененных участках содержит причину и task reference.

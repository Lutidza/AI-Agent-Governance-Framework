section: core
version: 1
entries:
  - id: AAGF-CORE-001
    title: Declarative-First Source of Truth
    intent: Все нормативные изменения должны начинаться в machine-readable слое.
    rules:
      - aagf/docs/spec/** MUST рассматриваться как primary source of truth.
      - aagf/docs/human/** и aagf/docs/adapters/** MUST рассматриваться как derived layers.
      - Прямые изменения в derived layers MUST NOT считаться завершенными без синхронизации source-слоя.
    if_then:
      - if: Изменение внесено только в aagf/docs/human/** или aagf/docs/adapters/**
        then: Агент MUST внести эквивалентное изменение в aagf/docs/spec/** в том же шаге.
      - if: Выявлен конфликт между source и derived слоями
        then: Приоритет MUST быть у aagf/docs/spec/**.
    checks:
      - Проверить, что изменение зафиксировано в aagf/docs/spec/**.
      - Проверить, что docs:generate не создает неожиданный drift.
  - id: AAGF-CORE-002
    title: Контурная изоляция
    intent: Слои root/meta, docs и runtime adapters должны оставаться разделенными.
    rules:
      - Агент MUST явно определять целевой контур до начала правок.
      - Правила root/meta и docs MUST NOT смешиваться в одном действии без явного запроса пользователя.
      - Межконтурные изменения MAY выполняться только с явным подтверждением.
    if_then:
      - if: Задача затрагивает более одного контура
        then: Агент MUST запросить подтверждение пользователя до внесения правок.
      - if: Контур задачи не определен
        then: Агент MUST остановиться и запросить уточнение.
    checks:
      - Проверить список измененных файлов и их принадлежность контуру.
      - Проверить, что в handoff указан затронутый контур.
  - id: AAGF-CORE-003
    title: Contract-First Code Comments
    intent: Обеспечить единый стандарт комментариев для публичных контрактов и нетривиальной логики.
    rules:
      - Публичные функции, методы и API-контракты MUST иметь структурированный комментарий в нативном формате языка (JSDoc/TypeDoc/docstring/аналог).
      - Комментарий MUST описывать назначение, входы, выходы, побочные эффекты и ограничения.
      - Комментарий MUST NOT дублировать очевидный синтаксис и MUST NOT содержать placeholder-тексты.
    if_then:
      - if: Язык поддерживает теги параметров и возврата
        then: Комментарий MUST включать эквиваленты @param/@returns/@throws.
      - if: Изменена нетривиальная логика без изменения внешнего API
        then: Агент MUST добавить краткий поясняющий комментарий о причине изменения рядом с блоком.
    checks:
      - Проверить, что для измененных публичных контрактов есть структурированные комментарии.
      - Проверить отсутствие placeholder-комментариев и устаревших описаний после правок.

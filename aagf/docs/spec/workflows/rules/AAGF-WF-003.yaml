version: 1
section: workflows
entry:
  id: AAGF-WF-003
  file_slug: local-readme-adjacency-sync
  title: Local README Adjacency Sync Workflow
  intent: "Для каждой изменяемой модульной папки README.md обязателен: существующий README обновляется, отсутствующий README создается."
  rules:
    - Для каждой папки, где агент изменяет код, MUST существовать локальный README.md.
    - IF локальный README.md уже существует THEN агент MUST прочитать его до начала правок и MUST обновить в том же изменении.
    - IF локальный README.md отсутствует THEN агент MUST создать README.md в этой папке в том же изменении.
    - Обновление или создание README.md MUST включать version, updated_at, changes_full, changes_short.
    - README.md MUST отражать фактическое текущее поведение кода; устаревшие инструкции, противоречия и битые ссылки MUST NOT оставаться.
    - В handoff агент MUST указывать полный путь от корня проекта до каждого созданного/обновленного README.md.
  if_then:
    - if: В папке измененного кода найден README.md
      then: Агент MUST прочитать и обновить этот README.md в том же PR/коммите.
    - if: В папке измененного кода README.md отсутствует
      then: Агент MUST создать README.md в этой папке до завершения задачи.
    - if: Обновлены API, контракты, сценарии использования, конфигурация или зависимости
      then: README.md MUST быть синхронизирован по разделам usage/contracts/setup/dependencies/examples.
    - if: README.md не был создан или обновлен в измененной папке
      then: Задача MUST NOT переходить в done.
  checks:
    - Проверить, что для каждой папки с измененным кодом существует локальный README.md после выполнения задачи.
    - Проверить, что существующие README.md были обновлены, а отсутствующие README.md созданы в том же изменении.
    - Проверить, что каждый созданный/обновленный README.md содержит version, updated_at, changes_full, changes_short.
    - Проверить отсутствие противоречий между README.md и фактическим кодом модуля.
    - Проверить валидность ссылок и путей в README.md.
    - Проверить, что в handoff перечислены полные пути до всех созданных/обновленных README.md.
  steps:
    - "Для каждой папки с изменяемым кодом проверить наличие README.md."
    - "Если README.md существует: прочитать перед началом правок и обновить после правок."
    - "Если README.md отсутствует: создать README.md в этой же папке."
    - "Заполнить обязательные поля version, updated_at, changes_full, changes_short."
    - "Проверить согласованность README.md с кодом и валидность ссылок."
    - "Зафиксировать в handoff полные пути созданных/обновленных README.md."
  handoff:
    - "Перечень README.md, прочитанных до начала правок."
    - "Перечень созданных README.md с полными путями от корня проекта."
    - "Перечень обновленных README.md с полными путями от корня проекта."
    - "Список синхронизированных разделов (usage/contracts/setup/dependencies/examples)."

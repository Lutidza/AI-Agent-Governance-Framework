version: 2
mode: dry-run
detector:
  provider: mcp
  tool: aagf.detect_stack_deep
  protocol: aagf.mcp.v1
  notify_dialog: true
thresholds:
  auto: 0.85
  confirm: 0.6
levels_required:
  - os
  - server
  - runtime
  - languages
  - frameworks
  - libraries
  - packages
  - databases
  - cache
  - messaging
  - ci
  - deploy
last_session:
  session_id: none
  status: pending-confirm
  started_at: 1970-01-01T00:00:00.000Z
  finished_at: 1970-01-01T00:00:00.000Z
  result:
    selected_stack: unknown
    confidence: 0
    decision: unknown
    evidence: []
    recommendation: manual-selection-required
    source: mcp
    stack_context_ref: aagf/docs/spec/project/stack-context.yaml
    overrides_applied: false

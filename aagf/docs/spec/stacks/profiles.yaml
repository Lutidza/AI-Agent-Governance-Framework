section: stacks
version: 1
entries:
  - id: AAGF-STACK-001
    title: Stack Pack как заменяемый модуль
    intent: Стековый блок должен заменяться без изменения core-политик.
    rules:
      - Stack-spec MUST описывать только технологические требования конкретного стека.
      - Stack-spec MUST NOT изменять core-инварианты governance-системы.
      - Замена stack pack MAY выполняться без изменений в core/**.
    if_then:
      - if: Требуется изменить правила тестирования для конкретного стека
        then: Изменение MUST вноситься в stack-spec, а не в core-политики.
      - if: Stack-spec вводит правило, конфликтующее с core
        then: Конфликт MUST быть эскалирован и разрешен через rule precedence.
    checks:
      - Проверить, что изменения ограничены stack-слоем.
      - Проверить, что core-политики остаются неизменными.
  - id: AAGF-STACK-002
    title: Документирование стековых допущений
    intent: Для каждого стека должны быть формализованы ограничения, риски и критерии валидации.
    rules:
      - Stack-spec MUST включать ограничения по зависимостям и версионированию.
      - Stack-spec MUST включать требования к тестированию и quality gates.
      - Stack-spec MUST использовать единый формат rule IDs и IF -> THEN условий.
    if_then:
      - if: В stack-spec добавлена новая зависимость
        then: MUST быть добавлены проверка совместимости и migration notes.
      - if: Stack-изменение влияет на CI/CD
        then: Изменение MUST быть отмечено как risk-critical и требовать подтверждения.
    checks:
      - Проверить наличие rule IDs, checks и risk notes.
      - Проверить согласованность stack-spec с workflow и role спецификациями.

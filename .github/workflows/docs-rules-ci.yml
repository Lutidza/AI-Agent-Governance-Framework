name: Docs Rules CI

on:
  push:
  pull_request:

jobs:
  docs-rules:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Validate Specs
        run: npm run docs:validate

      - name: Generate Derived Layers
        run: npm run docs:generate

      - name: Check Drift
        run: npm run docs:check

      - name: Rules Contract Test
        run: npm run docs:test:rules
